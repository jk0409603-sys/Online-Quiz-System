<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Quiz System</title>
  <style>
    :root { color-scheme: light; font-family: Arial, sans-serif; }
    body { margin: 0; background: linear-gradient(135deg, #0f172a, #111827); color: #e5eefb; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 18px; padding: 18px; box-shadow: 0 20px 35px rgba(0,0,0,0.25); }
    input, button, select, textarea { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 12px; border: 1px solid #475569; font-size: 1rem; background: #0f172a; color: #e5eefb; }
    textarea { min-height: 120px; resize: vertical; }
    button { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; cursor: pointer; font-weight: 700; }
    .btn.secondary { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .score-box { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .mini { background: #111827; border: 1px solid #1f2937; padding: 14px; border-radius: 12px; min-width: 140px; }
    .tag { color: #bfdbfe; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-top: 12px; }
    .subject-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 16px; }
    .subject-card h3 { margin-top: 0; margin-bottom: 12px; }
    .subject-card button { width: 100%; margin-bottom: 8px; }
    .prompt-box { margin-top: 14px; }
    .row { display: grid; gap: 10px; }
    .options label { display: block; background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 10px; margin: 8px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section id="authSection" class="card">
      <h1>Study Hub Login / Signup</h1>
      <p>Sign in to track your tests, AI analysis, and progress planner.</p>
      <div class="row">
        <input id="username" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />
        <button id="loginBtn">Login</button>
        <button id="signupBtn" class="btn secondary">Signup</button>
      </div>
      <p id="status" class="muted" style="margin-top:8px"></p>
    </section>

    <section id="dashboardSection" class="card hidden">
      <h2>Dashboard</h2>
      <p id="welcomeText" class="muted"></p>
      <div id="dashboardSummary" class="score-box"></div>
      <div id="plannerBox" style="margin-top:16px"></div>
      <div id="recentTests" style="margin-top:16px"></div>
      <div class="subject-grid" style="margin-top:24px;">
        <div class="subject-card">
          <h3>Python</h3>
          <button onclick="startQuiz('Python','Beginner')">Easy</button>
          <button onclick="startQuiz('Python','Intermediate')">Medium</button>
          <button onclick="startQuiz('Python','Advanced')">Hard</button>
        </div>
        <div class="subject-card">
          <h3>Programming Basics</h3>
          <button onclick="startQuiz('Programming Basics','Beginner')">Easy</button>
          <button onclick="startQuiz('Programming Basics','Intermediate')">Medium</button>
          <button onclick="startQuiz('Programming Basics','Advanced')">Hard</button>
        </div>
        <div class="subject-card">
          <h3>Mathematics</h3>
          <button onclick="startQuiz('Mathematics','Beginner')">Easy</button>
          <button onclick="startQuiz('Mathematics','Intermediate')">Medium</button>
          <button onclick="startQuiz('Mathematics','Advanced')">Hard</button>
        </div>
        <div class="subject-card">
          <h3>Data Structures</h3>
          <button onclick="startQuiz('Data Structures','Beginner')">Easy</button>
          <button onclick="startQuiz('Data Structures','Intermediate')">Medium</button>
          <button onclick="startQuiz('Data Structures','Advanced')">Hard</button>
        </div>
      </div>
      <div class="subject-card" style="margin-top:16px;">
        <h3>Custom Topic</h3>
        <input id="topic" placeholder="Enter a custom topic" />
        <select id="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>
        <button id="startBtn">Start Custom Quiz</button>
      </div>
      <div class="card" style="margin-top:20px; background: rgba(15,23,42,0.95);">
        <h3>Talk to AI Study Coach</h3>
        <p class="muted">Ask the AI for a study plan, topic summary, or exam review guidance.</p>
        <textarea id="aiPrompt" placeholder="Ask for a study plan, topic summary, or learning strategy..."></textarea>
        <div class="row prompt-box">
          <button id="studyPlanBtn">Get AI Study Plan</button>
          <button id="talkAiBtn" class="btn secondary">Talk to AI</button>
        </div>
        <div id="aiResponse" class="card" style="margin-top:16px; background: rgba(15,23,42,0.95);"></div>
      </div>
      <button class="btn secondary" onclick="logout()" style="margin-top:20px;">Logout</button>
    </section>

    <section id="questionSection" class="card hidden">
      <h2 id="qTitle"></h2>
      <p id="qText"></p>
      <div id="options" class="options"></div>
      <button id="nextBtn">Next</button>
    </section>

    <section id="resultSection" class="card hidden">
      <h2>Quiz Result</h2>
      <p id="quizMeta" class="muted"></p>
      <p id="scoreText"></p>
      <p id="feedbackText"></p>
      <button class="btn" onclick="retryQuiz()">Retry Same Quiz</button>
    </section>
  </main>
  <script>
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const statusText = document.getElementById('status');
    const authSection = document.getElementById('authSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const quizSection = document.getElementById('quizSection');
    const questionSection = document.getElementById('questionSection');
    const resultSection = document.getElementById('resultSection');
    const welcomeText = document.getElementById('welcomeText');
    const dashboardSummary = document.getElementById('dashboardSummary');
    const plannerBox = document.getElementById('plannerBox');
    const recentTests = document.getElementById('recentTests');
    const aiAssistSection = document.getElementById('aiAssistSection');
    const topicInput = document.getElementById('topic');
    const levelSelect = document.getElementById('level');
    const startBtn = document.getElementById('startBtn');
    const qTitle = document.getElementById('qTitle');
    const qText = document.getElementById('qText');
    const options = document.getElementById('options');
    const nextBtn = document.getElementById('nextBtn');
    const scoreText = document.getElementById('scoreText');
    const feedbackText = document.getElementById('feedbackText');
    const quizMeta = document.getElementById('quizMeta');
    const aiPrompt = document.getElementById('aiPrompt');
    const aiResponse = document.getElementById('aiResponse');
    const studyPlanBtn = document.getElementById('studyPlanBtn');
    const talkAiBtn = document.getElementById('talkAiBtn');
    let username = localStorage.getItem('oqs_username') || '';
    let questions = [];
    let current = 0;
    let answers = [];
    let lastTopic = '';
    let lastLevel = '';

    function setStatus(message) {
      statusText.textContent = message;
    }

    function showSection(section) {
      authSection.classList.toggle('hidden', section !== authSection);
      dashboardSection.classList.toggle('hidden', section !== dashboardSection);
      quizSection.classList.toggle('hidden', section !== quizSection);
      questionSection.classList.toggle('hidden', section !== questionSection);
      resultSection.classList.toggle('hidden', section !== resultSection);
    }

    function setVisibility({dashboard = false, quiz = false, questions = false, result = false, ai = false}) {
      authSection.classList.toggle('hidden', dashboard || quiz || questions || result || ai);
      dashboardSection.classList.toggle('hidden', !dashboard);
      quizSection.classList.toggle('hidden', !quiz);
      questionSection.classList.toggle('hidden', !questions);
      resultSection.classList.toggle('hidden', !result);
      aiAssistSection.classList.toggle('hidden', !ai);
    }

    async function loadDashboard() {
      if (!username) return;
      setStatus('Loading dashboard...');
      try {
        const res = await fetch(`/api/dashboard?username=${encodeURIComponent(username)}`);
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
        welcomeText.textContent = `Welcome back, ${data.username}!`;
        dashboardSummary.innerHTML = `
          <div class="mini"><div class="tag">Attempted</div><div>${data.attempted}</div></div>
          <div class="mini"><div class="tag">Avg Score</div><div>${data.average}%</div></div>
          <div class="mini"><div class="tag">Study Level</div><div>${data.study_percentage}%</div></div>
        `;
        plannerBox.innerHTML = `<div class="card"><h3>Study Planner</h3><p class="muted">${data.planner.recommended_focus}</p><p class="muted">Next step: ${data.planner.next_step}</p></div>`;
        recentTests.innerHTML = `<h3>Recent Tests</h3>${data.recent_tests.length ? data.recent_tests.map(test => `<div class="mini"><div class="tag">${test.topic} • ${test.level}</div><div>${test.score}/${test.max_score} on ${new Date(test.date).toLocaleDateString()}</div><div class="muted">${test.feedback}</div></div>`).join('') : '<p class="muted">No tests taken yet.</p>'}`;
        setVisibility({dashboard: true, quiz: true, ai: true});
      } catch (err) {
        setStatus(`Dashboard error: ${err.message}`);
      } finally {
        if (!dashboardSection.classList.contains('hidden')) setStatus('');
      }
    }

    async function submitAuth(type) {
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      if (!usernameInput || !passwordInput) {
        return setStatus('Enter username and password.');
      }
      setStatus(type === 'signup' ? 'Signing up...' : 'Logging in...');
      try {
        const res = await fetch(`/api/${type}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username: usernameInput, password: passwordInput}),
        });
        const data = await res.json();
        if (res.status !== 200) {
          throw new Error(data.error || 'Authentication failed');
        }
        username = data.username;
        localStorage.setItem('oqs_username', username);
        setStatus('');
        await loadDashboard();
      } catch (err) {
        setStatus(err.message);
      }
    }

    function logout() {
      username = '';
      localStorage.removeItem('oqs_username');
      setVisibility({dashboard: false, quiz: false, questions: false, result: false, ai: false});
      authSection.classList.remove('hidden');
      setStatus('Logged out.');
    }

    loginBtn.onclick = () => submitAuth('login');
    signupBtn.onclick = () => submitAuth('signup');

    async function startQuiz(topic, level) {
      if (!username) {
        setStatus('Please login first.');
        return;
      }
      lastTopic = topic;
      lastLevel = level;
      startBtn.disabled = true;
      setStatus('Loading quiz...');
      try {
        const res = await fetch('/start', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({topic, level, count: 5}),
        });
        const data = await res.json();
        questions = data.questions || [];
        if (!questions.length) throw new Error('No questions returned.');
        current = 0;
        answers = [];
        setStatus('');
        questionSection.classList.remove('hidden');
        resultSection.classList.add('hidden');
        renderQuestion();
      } catch (err) {
        setStatus(`Quiz load failed: ${err.message}`);
      } finally {
        startBtn.disabled = false;
      }
    }

    startBtn.onclick = () => {
      const topic = topicInput.value.trim();
      const level = levelSelect.value;
      if (!topic) {
        setStatus('Enter a quiz topic.');
        return;
      }
      startQuiz(topic, level);
    };


    function renderQuestion() {
      const question = questions[current];
      if (!question) return;
      qTitle.textContent = `Question ${current + 1} of ${questions.length}`;
      qText.textContent = question.question;
      options.innerHTML = '';
      question.options.forEach((opt, idx) => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="radio" name="opt" value="${opt}" ${idx === 0 ? 'checked' : ''}> ${opt}`;
        options.appendChild(label);
      });
    }

    function retryQuiz() {
      if (!questions.length) return;
      current = 0;
      answers = [];
      scoreText.textContent = '';
      feedbackText.textContent = '';
      quizMeta.textContent = `Topic: ${lastTopic} | Level: ${lastLevel}`;
      resultSection.classList.add('hidden');
      questionSection.classList.remove('hidden');
      renderQuestion();
    }

    async function sendAiRequest(mode) {
      const prompt = aiPrompt.value.trim();
      if (!prompt) {
        return setStatus('Write a prompt for the AI study coach.');
      }
      setStatus('Talking to AI...');
      try {
        const res = await fetch('/api/study-plan', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({prompt}),
        });
        const data = await res.json();
        if (res.status !== 200) {
          throw new Error(data.error || 'AI request failed');
        }
        aiResponse.innerHTML = `
          <h3>${mode === 'plan' ? 'AI Study Plan' : 'AI Coach Response'}</h3>
          <p>${data.response.replace(/\n/g, '<br>')}</p>
          <p class="muted">${data.advice}</p>
        `;
      } catch (err) {
        setStatus(err.message);
      } finally {
        setStatus('');
      }
    }

    studyPlanBtn.onclick = () => sendAiRequest('plan');
    talkAiBtn.onclick = () => sendAiRequest('chat');

    nextBtn.onclick = async () => {
      const chosen = document.querySelector('input[name="opt"]:checked')?.value;
      answers.push(chosen || '');
      if (current < questions.length - 1) {
        current += 1;
        renderQuestion();
        return;
      }
      questionSection.classList.add('hidden');
      setStatus('Submitting answers...');
      try {
        const res = await fetch('/answer', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({answers, questions, username, topic: lastTopic, level: lastLevel}),
        });
        const data = await res.json();
        const score = data.score || questions.reduce((acc, q, i) => acc + (answers[i] === q.answer ? 1 : 0), 0);
        quizMeta.textContent = `Topic: ${lastTopic} | Level: ${lastLevel}`;
        scoreText.textContent = `Score: ${score} / ${questions.length}`;
        feedbackText.textContent = data.feedback || 'Great effort!';
        resultSection.classList.remove('hidden');
        await loadDashboard();
      } catch (err) {
        setStatus(`Submission failed: ${err.message}`);
      } finally {
        setStatus('');
      }
    };

    if (username) {
      authSection.classList.add('hidden');
      loadDashboard();
    }
  </script>
</body>
</html>
