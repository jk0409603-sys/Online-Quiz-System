<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Quiz System</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #111827, #1f2937); color: #eff6ff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: rgba(17,24,39,0.95); border: 1px solid #334155; border-radius: 18px; padding: 18px; box-shadow: 0 18px 30px rgba(0,0,0,0.25); }
    input, button, select { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 12px; border: 1px solid #475569; font-size: 1rem; }
    button { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; font-weight: 700; }
    .options label { display: block; background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 10px; margin: 8px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Online Quiz System</h1>
      <p>Choose a topic, start a quiz, and get AI feedback.</p>
      <input id="topic" placeholder="Enter any topic" />
      <select id="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>
      <button id="startBtn">Start Quiz</button>
    </section>
    <section id="quizSection" class="card hidden">
      <h2 id="qTitle"></h2>
      <p id="qText"></p>
      <div id="options" class="options"></div>
      <button id="nextBtn">Next</button>
    </section>
    <section id="resultSection" class="card hidden">
      <h2>Results</h2>
      <p id="scoreText"></p>
      <p id="feedbackText"></p>
    </section>
  </main>
  <script>
    const startBtn = document.getElementById('startBtn');
    const quizSection = document.getElementById('quizSection');
    const resultSection = document.getElementById('resultSection');
    const qTitle = document.getElementById('qTitle');
    const qText = document.getElementById('qText');
    const options = document.getElementById('options');
    const nextBtn = document.getElementById('nextBtn');
    const scoreText = document.getElementById('scoreText');
    const feedbackText = document.getElementById('feedbackText');
    let questions = [], current = 0, answers = [];

    startBtn.onclick = async () => {
      const topic = document.getElementById('topic').value.trim();
      const level = document.getElementById('level').value;
      if (!topic) return alert('Please enter a topic');
      const res = await fetch('/start', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({topic, level, count: 10, rounds: 5})});
      const data = await res.json();
      questions = data.rounds?.[0]?.questions || data.questions || [];
      current = 0; answers = [];
      resultSection.classList.add('hidden');
      quizSection.classList.remove('hidden');
      renderQuestion();
    };

    function renderQuestion() {
      const q = questions[current];
      if (!q) return;
      qTitle.textContent = `Question ${current + 1} of ${questions.length}`;
      qText.textContent = q.question;
      options.innerHTML = '';
      q.options.forEach((opt, idx) => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="radio" name="opt" value="${opt}" ${idx === 0 ? 'checked' : ''}> ${opt}`;
        options.appendChild(label);
      });
    }

    nextBtn.onclick = async () => {
      const chosen = document.querySelector('input[name="opt"]:checked')?.value || '';
      answers.push(chosen);
      if (current < questions.length - 1) {
        current += 1; renderQuestion(); return;
      }
      quizSection.classList.add('hidden');
      const res = await fetch('/answer', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({answers})});
      const data = await res.json();
      const score = questions.reduce((acc, q, i) => acc + (answers[i] === q.answer ? 1 : 0), 0);
      scoreText.textContent = `Score: ${score} / ${questions.length}`;
      feedbackText.textContent = data.feedback || 'Great effort!';
      resultSection.classList.remove('hidden');
    };
  </script>
</body>
</html>
